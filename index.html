<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BHARAT AGRI-INTEL — Mandi News Terminal</title>
  <script src="https://s3.tradingview.com/tv.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Martel:wght@700&family=JetBrains+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      /* Indian Agri-Tech Palette: Deep Forest Green & Saffron Accents */
      --bg: #061109; 
      --surface: #0f1f13; 
      --surface-light: #1b2e20;
      --accent: #f97316; /* Saffron/Orange for Alerts */
      --primary: #22c55e; /* Vibrant Green for Growth */
      --text-main: #f0fdf4;
      --text-dim: #86a08c;
      --border: rgba(34, 197, 94, 0.15);
      --font-main: 'Inter', sans-serif;
      --font-hindi: 'Martel', serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text-main); font-family: var(--font-main); line-height: 1.5; }

    header { 
        background: rgba(15, 31, 19, 0.9); 
        backdrop-filter: blur(10px); 
        border-bottom: 2px solid var(--primary);
        padding: 15px 25px; 
        position: sticky; top: 0; z-index: 1000;
    }

    #logo h1 { font-family: var(--font-hindi); font-size: 1.6rem; color: var(--primary); }
    .sub-logo { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 1px; }

    /* Market Ticker with Indian Context */
    #ticker-bar { 
        background: #000; 
        padding: 10px 25px; 
        font-size: 0.8rem; 
        border-bottom: 1px solid var(--border);
        color: var(--primary);
        display: flex; justify-content: space-between;
    }

    #main { display: grid; grid-template-columns: 1fr 360px; gap: 20px; max-width: 1400px; margin: 20px auto; padding: 0 20px; }

    .news-card { 
        background: var(--surface); 
        border-left: 4px solid var(--primary); 
        border-radius: 8px; 
        padding: 20px; 
        margin-bottom: 15px; 
        transition: 0.3s;
    }
    .news-card:hover { background: var(--surface-light); border-left-color: var(--accent); }
    
    .nc-source { font-size: 0.7rem; color: var(--accent); font-weight: bold; margin-bottom: 5px; }
    .nc-headline { font-size: 1.15rem; font-weight: 600; margin-bottom: 8px; color: #fff; }

    .ctrl-btn { 
        background: var(--surface-light); border: 1px solid var(--primary); color: #fff; 
        padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 0.8rem;
    }
    .ctrl-btn.active { background: var(--primary); color: #000; font-weight: bold; }

    .tab-btn { 
        padding: 10px 20px; background: transparent; border: 1px solid var(--border); 
        color: var(--text-dim); border-radius: 5px; cursor: pointer; margin-right: 8px;
    }
    .tab-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(34, 197, 94, 0.05); }

    .widget { background: var(--surface); border-radius: 10px; padding: 20px; border: 1px solid var(--border); }
    
    @media (max-width: 900px) { #main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <div id="logo">
      <h1>BHARAT <span style="color:#fff">AGRI-INTEL</span></h1>
      <div class="sub-logo">Indian Commodity Real-Time Terminal</div>
    </div>
    <div id="header-controls">
      <button class="ctrl-btn" onclick="openSettings()">⚙ Settings</button>
      <button class="ctrl-btn active" id="refresh-btn" onclick="fetchAllNews(true)">⟳ Sync Mandi Nodes</button>
    </div>
  </div>
</header>

<div id="ticker-bar">
  <span><span style="color:var(--accent)">●</span> NCDEX & MCX LIVE</span>
  <div id="ticker-inner">Loading local market data...</div>
</div>

<main id="main">
  <nav id="tab-bar" style="grid-column: 1/-1; margin-bottom: 10px; overflow-x:auto; white-space:nowrap;">
    <button class="tab-btn active" onclick="filterSection('all', this)">All News</button>
    <button class="tab-btn" onclick="filterSection('oilseeds', this)">Mustard/Soybean</button>
    <button class="tab-btn" onclick="filterSection('spices', this)">Jeera/Turmeric</button>
    <button class="tab-btn" onclick="filterSection('pulses', this)">Pulses/Chana</button>
    <button class="tab-btn" onclick="filterSection('policy', this)">Govt Policy/FCI</button>
  </nav>

  <section id="feed-col">
    <div id="news-feed"></div>
  </section>

  <aside id="sidebar">
    <div class="widget">
      <h3 style="font-size:0.8rem; margin-bottom:15px; color:var(--text-dim)">LOCAL WATCHLIST (INR)</h3>
      <div id="watchlist-body"></div>
      <div id="tv-chart-container" style="height:300px; margin-top:20px; border-radius:8px; overflow:hidden;"></div>
    </div>
  </aside>
</main>

<div id="settings-panel" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center; backdrop-filter:blur(5px);">
    <div style="background:var(--surface); padding:30px; border-radius:12px; width:90%; max-width:500px; border:1px solid var(--primary);">
        <h2 style="margin-bottom:20px; color:var(--primary)">Terminal Config</h2>
        <div id="keyword-manager-ui"></div>
        <button class="ctrl-btn active" onclick="saveSettings()" style="width:100%; margin-top:20px">Save Changes</button>
        <button class="ctrl-btn" onclick="closeSettings()" style="width:100%; margin-top:10px">Close</button>
    </div>
</div>

<script>
const STORAGE_KEY = 'BHARAT_AGRI_CONFIG';
let allArticles = [];
let activeSection = 'all';

let CONFIG = {
    keywords: {
        oilseeds: 'mustard, sarson, soybean, palm oil, refined oil',
        spices: 'jeera, turmeric, dhaniya, coriander, spices',
        pulses: 'chana, tur, moong, pulses, gram',
        policy: 'fci, msp, government, subsidy, export ban, import duty'
    }
};

// Indian-centric News Sources
const FEED_SOURCES = [
    { name: "Economic Times Agri", tag: "ET AGRI", url: "https://economictimes.indiatimes.com/news/economy/agriculture/rssfeeds/12020999.cms" },
    { name: "Krishi Jagran", tag: "KRISHI", url: "https://krishijagran.com/rss-feeds/" },
    { name: "Business Standard", tag: "BS", url: "https://www.business-standard.com/rss/markets-106.rss" },
    { name: "Financial Express", tag: "FE", url: "https://www.financialexpress.com/market/commodities/feed/" },
    { name: "Reuters Agri", tag: "REUTERS", url: "https://www.reutersagency.com/feed/?best-sectors=agriculture&post_type=best" },
    { name: "USDA Global", tag: "USDA", url: "https://www.usda.gov/rss/home.xml" },
    { name: "Financial Times Agri", tag: "FT", url: "https://www.ft.com/agriculture?format=rss" }
];

async function fetchAllNews() {
    document.getElementById("refresh-btn").textContent = "Syncing...";
    allArticles = [];

    const tasks = FEED_SOURCES.map(async (src) => {
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(src.url)}&api_key=ogzjzg9nnzk9e5a1fvcc2nllyjy3wui7s7aeffvh`);
            const data = await res.json();
            data.items.forEach(item => {
                allArticles.push({
                    headline: item.title,
                    summary: item.description.replace(/<[^>]*>/g, '').substring(0, 180),
                    source: src.tag,
                    link: item.link,
                    section: detectSection(item.title.toLowerCase()),
                    timestamp: new Date(item.pubDate).getTime()
                });
            });
        } catch (e) {}
    });

    await Promise.all(tasks);
    allArticles.sort((a,b) => b.timestamp - a.timestamp);
    renderNewsFeed();
    updateWatchlist();
    document.getElementById("refresh-btn").textContent = "⟳ Sync Mandi Nodes";
}

function detectSection(text) {
    for (const [sec, kws] of Object.entries(CONFIG.keywords)) {
        if (kws.split(',').some(k => text.includes(k.trim()))) return sec;
    }
    return "pulses";
}

function renderNewsFeed() {
    const feed = document.getElementById("news-feed");
    const filtered = activeSection === 'all' ? allArticles : allArticles.filter(a => a.section === activeSection);
    feed.innerHTML = filtered.map(a => `
        <div class="news-card" onclick="window.open('${a.link}')">
            <div class="nc-source">${a.source} • ${new Date(a.timestamp).toLocaleTimeString()}</div>
            <div class="nc-headline">${a.headline}</div>
            <p style="font-size:0.85rem; color:var(--text-dim)">${a.summary}...</p>
        </div>
    `).join("");
}

function updateWatchlist() {
    // Simulated Indian Market Data (usually requires a paid API for real-time NCDEX)
    const items = [
        { name: "Mustard (NCDEX)", price: "5,450", change: "+1.2%" },
        { name: "Jeera (NCDEX)", price: "24,800", change: "-0.8%" },
        { name: "Soybean (CBOT/IND)", price: "4,620", change: "+0.5%" },
        { name: "USD/INR", price: "83.42", change: "0.0%" }
    ];
    document.getElementById("watchlist-body").innerHTML = items.map(i => `
        <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border)">
            <span>${i.name}</span>
            <span style="color: ${i.change.includes('+') ? 'var(--primary)' : 'var(--accent)'}">${i.price} (${i.change})</span>
        </div>
    `).join("");
}

function injectLiveChart(symbol = "MCX:CRUDEOIL1!") {
    document.getElementById('tv-chart-container').innerHTML = `<div id="tv-widget"></div>`;
    new TradingView.widget({
        "autosize": true, "symbol": symbol, "interval": "D", "theme": "dark", "container_id": "tv-widget"
    });
}

function filterSection(sec, btn) {
    activeSection = sec;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderNewsFeed();
    const charts = { oilseeds: "MCX:CPO1!", pulses: "NCDEX:CHANA1!", spices: "NCDEX:JEERA1!", policy: "ECONOMICS:ININR" };
    if(charts[sec]) injectLiveChart(charts[sec]);
}

window.addEventListener("DOMContentLoaded", () => {
    fetchAllNews();
    injectLiveChart("NCDEX:JEERA1!");
});

function openSettings() { document.getElementById("settings-panel").style.display='flex'; }
function closeSettings() { document.getElementById("settings-panel").style.display='none'; }
</script>
</body>
</html>
