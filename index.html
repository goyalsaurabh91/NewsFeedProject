<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BHARAT AGRI-INTEL — Mandi News Terminal</title>
  <script src="https://s3.tradingview.com/tv.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Martel:wght@700&family=JetBrains+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0f172a;        /* Deep Slate Blue */
    --surface: #1e293b;   /* Soft Navy */
    --surface-light: #334155;
    --accent: #f59e0b;    /* Warm Amber/Gold */
    --accent-dim: rgba(245, 158, 11, 0.15);
    --text-main: #f8fafc; /* Off-White */
    --text-dim: #94a3b8;  /* Muted Blue-Grey */
    --border: rgba(255, 255, 255, 0.08);
    --green: #10b981;
    --red: #ef4444;
    --font-main: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --font-serif: 'Playfair Display', serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text-main); font-family: var(--font-main); line-height: 1.5; }

    header { 
        background: rgba(15, 31, 19, 0.9); 
        backdrop-filter: blur(10px); 
        border-bottom: 2px solid var(--primary);
        padding: 15px 25px; 
        position: sticky; top: 0; z-index: 1000;
    }

    #logo h1 { font-family: var(--font-hindi); font-size: 1.6rem; color: var(--primary); }
    .sub-logo { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 1px; }

    #ticker-bar { 
        background: #000; padding: 10px 25px; font-size: 0.8rem; 
        border-bottom: 1px solid var(--border); color: var(--primary);
        display: flex; justify-content: space-between;
    }

    #main { display: grid; grid-template-columns: 1fr 360px; gap: 20px; max-width: 1400px; margin: 20px auto; padding: 0 20px; }

    .news-card { 
        background: var(--surface); border-left: 4px solid var(--primary); 
        border-radius: 8px; padding: 20px; margin-bottom: 15px; transition: 0.3s; cursor: pointer;
    }
    .news-card:hover { background: var(--surface-light); border-left-color: var(--accent); }
    
    /* Major Alert Styling */
    .news-card.major-event { border-left: 4px solid var(--alert); background: rgba(239, 68, 68, 0.05); }
    .news-card.major-event:hover { border-left-color: var(--alert); background: rgba(239, 68, 68, 0.1); }
    
    .nc-source { font-size: 0.7rem; color: var(--accent); font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
    .nc-headline { font-size: 1.15rem; font-weight: 600; margin-bottom: 8px; color: #fff; }

    .ctrl-btn { 
        background: var(--surface-light); border: 1px solid var(--primary); color: #fff; 
        padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 0.8rem;
    }
    .ctrl-btn.active { background: var(--primary); color: #000; font-weight: bold; }

    .tab-btn { 
        padding: 10px 20px; background: transparent; border: 1px solid var(--border); 
        color: var(--text-dim); border-radius: 5px; cursor: pointer; margin-right: 8px;
    }
    .tab-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(34, 197, 94, 0.05); }

    .widget { background: var(--surface); border-radius: 10px; padding: 20px; border: 1px solid var(--border); }
    
    .live-dot { height: 8px; width: 8px; background-color: var(--alert); border-radius: 50%; display: inline-block; animation: blink 1.5s infinite; }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

    @media (max-width: 900px) { #main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <div id="logo">
      <h1>BHARAT <span style="color:#fff">AGRI-INTEL</span></h1>
      <div class="sub-logo">Edible Oils & Global Commodity Terminal</div>
    </div>
    <div id="header-controls">
      <button class="ctrl-btn active" id="refresh-btn" onclick="fetchAllNews(true)">⟳ Sync Data Nodes</button>
    </div>
  </div>
</header>

<div id="ticker-bar">
  <span><span class="live-dot"></span> LIVE MARKET INTEL</span>
  <div id="ticker-inner">Fetching real-time updates...</div>
</div>

<main id="main">
  <nav id="tab-bar" style="grid-column: 1/-1; margin-bottom: 10px; overflow-x:auto; white-space:nowrap;">
    <button class="tab-btn active" onclick="filterSection('all', this)">All News</button>
    <button class="tab-btn" onclick="filterSection('soybean', this)">Soybean</button>
    <button class="tab-btn" onclick="filterSection('mustard', this)">Mustard/Rapeseed</button>
    <button class="tab-btn" onclick="filterSection('palm', this)">Palm Oil</button>
    <button class="tab-btn" onclick="filterSection('macro', this)">Global & Policy</button>
  </nav>

  <section id="feed-col">
    <div id="news-feed">
        <div style="padding: 40px; text-align: center; color: var(--text-dim);">Connecting to global feeds...</div>
    </div>
  </section>

  <aside id="sidebar">
    <div class="widget">
      <h3 style="font-size:0.8rem; margin-bottom:15px; color:var(--text-dim); display:flex; justify-content:space-between;">
          <span>LIVE FOREX & MACRO</span> <span class="live-dot" style="background-color: var(--primary)"></span>
      </h3>
      <div id="watchlist-body">
          <div style="color:var(--text-dim); font-size:0.8rem;">Fetching exchange rates...</div>
      </div>
      <div id="tv-chart-container" style="height:350px; margin-top:20px; border-radius:8px; overflow:hidden;"></div>
    </div>
  </aside>
</main>

<script>
let allArticles = [];
let activeSection = 'all';

// Expanded keywords to ensure more articles get captured
const CONFIG = {
    keywords: {
        soybean: ['soy', 'soya', 'soybean', 'meal', 'cbot'],
        mustard: ['mustard', 'sarson', 'rapeseed', 'canola', 'seed'],
        palm: ['palm', 'cpo', 'bmd', 'malaysia', 'indonesia', 'olein', 'edible oil'],
        macro: ['fci', 'msp', 'government', 'subsidy', 'duty', 'fed', 'rbi', 'inflation', 'economy']
    }
};

const MAJOR_WORDS = ['war', 'strike', 'disrupt', 'ban', 'tariff', 'supply chain', 'crisis', 'crash', 'surge', 'geopolitical', 'conflict'];

const FEED_SOURCES = [
    { name: "Reuters Agri", tag: "REUTERS", url: "https://www.reutersagency.com/feed/?best-sectors=agriculture&post_type=best" },
    { name: "Economic Times Agri", tag: "ET AGRI", url: "https://economictimes.indiatimes.com/news/economy/agriculture/rssfeeds/12020999.cms" },
    { name: "Business Standard", tag: "BS", url: "https://www.business-standard.com/rss/markets-106.rss" },
    { name: "Financial Express", tag: "FE", url: "https://www.financialexpress.com/market/commodities/feed/" },
    { name: "USDA Global", tag: "USDA", url: "https://www.usda.gov/rss/home.xml" },
    { name: "Krishi Jagran", tag: "KRISHI", url: "https://krishijagran.com/rss-feeds/" }
];

async function fetchAllNews() {
    const btn = document.getElementById("refresh-btn");
    const feed = document.getElementById("news-feed");
    
    btn.textContent = "⌛ Syncing...";
    feed.innerHTML = `<div style="padding:40px; text-align:center; color:var(--text-dim)">Fetching data from nodes...</div>`;
    allArticles = [];
    
    let successfulFeeds = 0;

    const tasks = FEED_SOURCES.map(async (src) => {
        try {
            // Removed the rate-limited API key to use standard free tier
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(src.url)}`);
            const data = await res.json();
            
            if (data.status === 'ok' && data.items) {
                successfulFeeds++;
                data.items.forEach(item => {
                    const fullText = (item.title + " " + (item.description || "")).toLowerCase();
                    
                    let parsedDate = Date.parse(item.pubDate);
                    if (isNaN(parsedDate)) parsedDate = Date.now(); 

                    allArticles.push({
                        id: item.link || Math.random().toString(),
                        headline: item.title,
                        summary: (item.description || "").replace(/<[^>]*>/g, '').substring(0, 180),
                        source: src.tag,
                        link: item.link,
                        section: detectSection(fullText),
                        isMajor: detectMajorEvent(fullText),
                        timestamp: parsedDate
                    });
                });
            } else {
                console.warn(`Proxy rejected ${src.tag}:`, data.message);
            }
        } catch (e) { 
            console.warn(`Network fail for: ${src.name}. Check ad-blocker.`); 
        }
    });

    await Promise.allSettled([...tasks, updateWatchlist()]);
    
    // Check if everything failed
    if (successfulFeeds === 0) {
        feed.innerHTML = `
            <div style="padding:40px; text-align:center; color:var(--alert); border: 1px solid var(--alert); border-radius: 8px; margin-top: 20px;">
                <b>🚨 DATA FETCH FAILED</b><br><br>
                The RSS Proxy is currently blocking the feeds.<br>
                1. Ensure your browser Ad-Blocker or Brave Shields are disabled for this page.<br>
                2. The proxy API might be temporarily rate-limiting public requests. Try again in 10 minutes.
            </div>`;
        document.getElementById("ticker-inner").textContent = "DATA SYNC FAILED — CHECK CONSOLE";
        btn.textContent = "⟳ Sync Data Nodes";
        return;
    }

    allArticles = allArticles.filter((v,i,a)=>a.findIndex(v2=>(v2.id===v.id))===i);
    allArticles.sort((a,b) => b.timestamp - a.timestamp);
    
    renderNewsFeed();
    
    if (allArticles.length > 0) {
        document.getElementById("ticker-inner").textContent = `LATEST: ${allArticles[0].headline}`;
    }
    
    btn.textContent = "⟳ Sync Data Nodes";
}

function detectSection(text) {
    for (const [sec, kws] of Object.entries(CONFIG.keywords)) {
        if (kws.some(k => text.includes(k))) return sec;
    }
    return "macro";
}

function detectMajorEvent(text) {
    return MAJOR_WORDS.some(w => text.includes(w));
}

function renderNewsFeed() {
    const feed = document.getElementById("news-feed");
    const filtered = activeSection === 'all' ? allArticles : allArticles.filter(a => a.section === activeSection);
    
    if (filtered.length === 0) {
        feed.innerHTML = `<div style="padding:40px; text-align:center; color:var(--text-dim)">No recent updates found specifically for this category today. Try viewing 'All News'.</div>`;
        return;
    }

    feed.innerHTML = filtered.map(a => `
        <div class="news-card ${a.isMajor ? 'major-event' : ''}" onclick="window.open('${a.link}')">
            <div class="nc-source">
                ${a.isMajor ? '🚨 CRITICAL ALERT • ' : ''} ${a.source} • ${new Date(a.timestamp).toLocaleString()}
            </div>
            <div class="nc-headline">${a.headline}</div>
            <p style="font-size:0.85rem; color:var(--text-dim)">${a.summary}...</p>
        </div>
    `).join("");
}

async function updateWatchlist() {
    const body = document.getElementById("watchlist-body");
    try {
        const res = await fetch("https://open.er-api.com/v6/latest/USD");
        const data = await res.json();
        
        const inr = data.rates.INR.toFixed(2);
        const myrInr = (data.rates.INR / data.rates.MYR).toFixed(2); 
        const eurInr = (data.rates.INR / data.rates.EUR).toFixed(2); 

        body.innerHTML = `
            <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border)">
                <span>USD / INR</span><span style="color: var(--primary); font-family:var(--font-mono)">₹ ${inr}</span>
            </div>
            <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border)">
                <span>MYR / INR (Palm Peg)</span><span style="color: var(--primary); font-family:var(--font-mono)">₹ ${myrInr}</span>
            </div>
            <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border)">
                <span>EUR / INR (Sun Peg)</span><span style="color: var(--primary); font-family:var(--font-mono)">₹ ${eurInr}</span>
            </div>
        `;
    } catch(e) {
        body.innerHTML = `<div style="color:var(--alert)">Failed to load FX data.</div>`;
    }
}

function injectLiveChart(symbol = "CBOT:ZS1!") {
    document.getElementById('tv-chart-container').innerHTML = `<div id="tv-widget"></div>`;
    new TradingView.widget({
        "autosize": true, "symbol": symbol, "interval": "D", "theme": "dark", "container_id": "tv-widget",
        "style": "1", "hide_top_toolbar": true
    });
}

function filterSection(sec, btn) {
    activeSection = sec;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderNewsFeed();
    
    const charts = { 
        soybean: "CBOT:ZS1!", 
        mustard: "ICE:RS1!", 
        palm: "MCX:CPO1!", 
        macro: "FX_IDC:USDINR",
        all: "CBOT:ZL1!"
    };
    if(charts[sec]) injectLiveChart(charts[sec]);
}

window.addEventListener("DOMContentLoaded", () => {
    fetchAllNews();
    injectLiveChart("CBOT:ZS1!"); 
    setInterval(() => fetchAllNews(), 15 * 60 * 1000);
});
</script>
</body>
</html>
