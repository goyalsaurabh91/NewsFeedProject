<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AGRI INTEL DESK — Commodity News Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    /* Soothing Elegant Palette */
    --bg: #0f172a;        /* Deep Slate Blue */
    --surface: #1e293b;   /* Soft Navy */
    --surface-light: #334155;
    --accent: #f59e0b;    /* Warm Amber/Gold */
    --accent-dim: rgba(245, 158, 11, 0.15);
    --text-main: #f8fafc; /* Off-White */
    --text-dim: #94a3b8;  /* Muted Blue-Grey */
    --border: rgba(255, 255, 255, 0.08);
    --green: #10b981;
    --red: #ef4444;
    --font-main: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --font-serif: 'Playfair Display', serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: var(--bg);
    color: var(--text-main);
    font-family: var(--font-main);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* Header Overhaul */
  #header {
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 1000;
    padding: 12px 24px;
  }

  #header-top {
    display: flex; justify-content: space-between; align-items: center;
  }

  #logo h1 {
    font-family: var(--font-serif);
    font-size: 1.4rem;
    letter-spacing: -0.02em;
    color: var(--accent);
  }

  .sub-logo {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-dim);
  }

  /* Control Buttons */
  .ctrl-btn {
    background: var(--surface-light);
    border: 1px solid var(--border);
    color: var(--text-main);
    padding: 6px 14px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    cursor: pointer;
    transition: 0.2s ease;
  }

  .ctrl-btn:hover { background: var(--accent); color: var(--bg); }
  .ctrl-btn.active { border-color: var(--accent); color: var(--accent); }

  /* Ticker */
  #ticker-bar {
    background: rgba(0,0,0,0.2);
    padding: 6px 24px;
    font-size: 0.7rem;
    font-family: var(--font-mono);
    border-bottom: 1px solid var(--border);
    display: flex; gap: 15px;
  }

  /* Main Layout */
  #main {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 24px;
    max-width: 1400px;
    margin: 20px auto;
    padding: 0 20px;
  }

  /* Tab Bar Design */
  #tab-bar {
    grid-column: 1 / -1;
    display: flex; gap: 10px;
    padding-bottom: 10px;
    overflow-x: auto;
  }

  .tab-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    font-size: 0.75rem;
  }

  .tab-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* News Card Styling */
  .news-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    transition: transform 0.2s ease, border-color 0.2s ease;
  }

  .news-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent-dim);
  }

  .nc-source {
    font-size: 0.65rem;
    color: var(--accent);
    font-family: var(--font-mono);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .nc-headline {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 10px;
    color: var(--text-main);
  }

  .nc-summary {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 15px;
  }

  /* Sidebar Widgets */
  .widget {
    background: var(--surface);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }

  .widget-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 15px;
    display: flex; justify-content: space-between;
  }

  /* Loader */
  .loader-container {
    text-align: center;
    padding: 50px;
  }
  
  .spinner {
    width: 30px; height: 30px;
    border: 3px solid var(--surface-light);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 15px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 900px) {
    #main { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header id="header">
  <div id="header-top">
    <div id="logo">
      <h1>AGRI INTEL <span style="font-weight:300">DESK</span></h1>
      <div class="sub-logo">Real-Time Commodity Terminal</div>
    </div>
    <div id="header-controls">
      <button class="ctrl-btn" onclick="openSettings()">⚙ Settings</button>
      <button class="ctrl-btn active" id="refresh-btn" onclick="fetchAllNews(true)">⟳ Refresh Feed</button>
    </div>
  </div>
</header>

<div id="ticker-bar">
  <span style="color: var(--accent)">● LIVE</span>
  <div id="ticker-inner">Fetching latest global market movements...</div>
</div>

<main id="main">
  <nav id="tab-bar">
    <button class="tab-btn active" onclick="filterSection('all', this)">All Feeds</button>
    <button class="tab-btn" onclick="filterSection('soybean', this)">Soybean</button>
    <button class="tab-btn" onclick="filterSection('mustard', this)">Mustard/Canola</button>
    <button class="tab-btn" onclick="filterSection('palm', this)">Palm Oil</button>
    <button class="tab-btn" onclick="filterSection('crude', this)">Crude Oil</button>
    <button class="tab-btn" onclick="filterSection('macro', this)">Macro/Forex</button>
  </nav>

  <section id="feed-col">
    <div id="loading-overlay" class="loader-container">
      <div class="spinner"></div>
      <p style="font-size: 0.8rem; color: var(--text-dim)">Connecting to global news nodes...</p>
    </div>
    <div id="news-feed"></div>
  </section>

  <aside id="sidebar">
    <div class="widget">
      <div class="widget-title"><span>📊 Market Watchlist</span> <span style="font-size: 0.6rem">USD/INR</span></div>
      <div id="watchlist-body">
        </div>
    </div>
    <div class="widget">
      <div class="widget-title"><span>🚨 Key Alerts</span></div>
      <div id="alert-log" style="font-size: 0.75rem; color: var(--text-dim)">
        No high-impact alerts in the last 4 hours.
      </div>
    </div>
  </aside>
</main>

<div id="settings-panel" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center;">
    <div style="background:var(--surface); padding:30px; border-radius:12px; width:400px; border:1px solid var(--border)">
        <h2 style="margin-bottom:20px; font-family:var(--font-serif)">Terminal Settings</h2>
        <div style="margin-bottom:15px">
            <label style="display:block; font-size:0.7rem; color:var(--text-dim); margin-bottom:5px">ANTHROPIC API KEY</label>
            <input type="password" id="set-apikey" style="width:100%; background:var(--bg); border:1px solid var(--border); color:white; padding:8px; border-radius:4px">
        </div>
        <button class="ctrl-btn active" onclick="saveSettings()" style="width:100%">Save & Close</button>
    </div>
</div>

<script>
// ============================================================
// AGRI INTEL DESK v2.0 — Logic Engine
// ============================================================

const MACRO_DATA = {};
// --- ADD THIS MISSING LOGIC ---
const STORAGE_KEY = 'AGRI_INTEL_CONFIG';
let CONFIG = { apiKey: '' };
let allArticles = [];
let activeSection = 'all';

const FEED_SOURCES = [
    { name: "Reuters Agri", tag: "REUTERS", url: "https://www.reutersagency.com/feed/?best-sectors=agriculture&post_type=best", section: "macro" },
    { name: "USDA Reports", tag: "USDA", url: "https://www.usda.gov/rss/home.xml", section: "macro" },
    { name: "Nasdaq Commodities", tag: "NASDAQ", url: "https://www.nasdaq.com/feed/rssoutbound?category=Commodities", section: "macro" }
];

const SECTION_KEYWORDS = {
    soybean: ['soy', 'soya', 'meal', 'cbot'],
    mustard: ['mustard', 'canola', 'rapeseed'],
    palm: ['cpo', 'palm', 'bmd', 'malaysia'],
    crude: ['oil', 'brent', 'wti', 'energy'],
    macro: ['fed', 'rbi', 'inflation', 'gdp', 'forex']
};

const MAJOR_KEYWORDS = ['breakout', 'ban', 'surge', 'crash', 'shortage', 'alert'];

// Essential helper for timeouts
async function fetchWithTimeout(resource, timeout = 8000) {
    const controller = new AbortController();
    const id = setTimeout(() => controller.abort(), timeout);
    const response = await fetch(resource, { signal: controller.signal });
    clearTimeout(id);
    return response;
}

// Essential helper for text cleaning
function stripHTML(html) {
    let doc = new DOMParser().parseFromString(html, 'text/html');
    return doc.body.textContent || "";
}

function cleanText(text) {
    return text.replace(/&nbsp;/g, ' ').replace(/\s+/g, ' ').trim();
}

function deduplicateArticles(articles) {
    const seen = new Set();
    return articles.filter(el => {
        const duplicate = seen.has(el.id);
        seen.add(el.id);
        return !duplicate;
    });
}

// Placeholder for missing functions in your original code
function loadConfig() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) CONFIG = JSON.parse(saved);
}

function filterSection(sec, btn) {
    activeSection = sec;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderNewsFeed();
}

function showToast(msg) { console.log("Toast: " + msg); }
function updateTicker() { 
    const ticker = document.getElementById("ticker-inner");
    if(allArticles.length > 0) ticker.textContent = allArticles[0].headline;
}
function checkMajorEvents() {}
function loadEvents() {}
async function fetchViaGoogleNews() { return; } // Placeholder


// ─── IMPROVED CURRENCY FETCH ─────────────────────────────────
async function fetchViaCurrencyAPI() {
  try {
    const res = await fetchWithTimeout("https://open.er-api.com/v6/latest/USD", 5000);
    if (!res.ok) return;
    const data = await res.json();
    if (data.rates) {
      MACRO_DATA.USDINR = data.rates.INR?.toFixed(2) || "—";
      MACRO_DATA.MYRINR = (data.rates.INR / data.rates.MYR).toFixed(2);
      MACRO_DATA.EURINR = (data.rates.INR / data.rates.EUR).toFixed(2);
    }
  } catch(e) { console.error("Currency Fetch Error", e); }
  renderMacroStrip();
  renderWatchlistPrices();
}

// ─── WATCHLIST DEFINITIONS ────────────────────────────────────
const WATCHLIST_ITEMS = [
  { label:"USD/INR", symbol:"USDINR", unit:"₹" },
  { label:"MYR/INR (Palm)", symbol:"MYRINR", unit:"₹" },
  { label:"EUR/INR (Sun)", symbol:"EURINR", unit:"₹" },
  { label:"Soybean (CBOT)", symbol:"ZS", unit:"CME" },
  { label:"CPO (BMD)", symbol:"FCPO", unit:"BMD" },
  { label:"Brent Crude", symbol:"BZ", unit:"ICE" }
];

function loadWatchlist() {
  const body = document.getElementById("watchlist-body");
  body.innerHTML = WATCHLIST_ITEMS.map(item => `
    <div class="watchlist-row" style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:0.8rem">
      <span class="wl-name" style="color:var(--text-dim)">${item.label}</span>
      <span class="wl-val" id="wl-${item.symbol}" style="font-family:var(--font-mono); color:var(--accent)">Loading...</span>
    </div>
  `).join("");
}

function renderWatchlistPrices() {
  if (MACRO_DATA.USDINR) setWL("USDINR", "₹" + MACRO_DATA.USDINR);
  if (MACRO_DATA.MYRINR) setWL("MYRINR", "₹" + MACRO_DATA.MYRINR);
  if (MACRO_DATA.EURINR) setWL("EURINR", "₹" + MACRO_DATA.EURINR);
  
  ["ZS","FCPO","BZ"].forEach(sym => {
    const el = document.getElementById("wl-" + sym);
    if (el) el.innerHTML = `<a href="#" style="color:var(--text-dim); text-decoration:none; font-size:0.65rem">LIVE CHART ↗</a>`;
  });
}

function setWL(symbol, val) {
  const el = document.getElementById("wl-" + symbol);
  if (el) el.textContent = val;
}

// ─── ENHANCED NEWS FETCH (The CORS Killer) ──────────────────
async function fetchAllNews(manual) {
  const btn = document.getElementById("refresh-btn");
  btn.textContent = "⌛ Syncing...";
  btn.disabled = true;

  allArticles = [];

  // Parallel Fetching from multiple sources using Proxy
  const feedTasks = FEED_SOURCES.map(async (source) => {
    try {
      // Primary Proxy: rss2json
      const proxyUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(source.url)}&api_key=ogzjzg9nnzk9e5a1fvcc2nllyjy3wui7s7aeffvh`; // Saurabh API key
      const res = await fetchWithTimeout(proxyUrl, 8000);
      const data = await res.json();
      
      if (data.items) {
        data.items.forEach(item => {
          const text = (item.title + " " + item.description).toLowerCase();
          const section = detectSection(text) || source.section;
          const isMajor = MAJOR_KEYWORDS.some(k => text.includes(k.toLowerCase()));
          
          allArticles.push({
            id: hashStr(item.guid || item.link),
            headline: cleanText(item.title),
            summary: cleanText(stripHTML(item.description)).substring(0, 200),
            source: source.tag,
            link: item.link,
            section: section,
            isMajor: isMajor,
            sentiment: detectSentiment(text),
            timestamp: new Date(item.pubDate).getTime() || Date.now()
          });
        });
      }
    } catch (e) { console.warn(`Failed to fetch ${source.name}`); }
  });

  await Promise.allSettled([
    ...feedTasks,
    fetchViaCurrencyAPI(),
    fetchViaGoogleNews()
  ]);

  allArticles = deduplicateArticles(allArticles);
  allArticles.sort((a, b) => b.timestamp - a.timestamp);

  renderNewsFeed();
  updateTicker();
  checkMajorEvents();

  // Update Status
  document.getElementById("loading-overlay").style.display = "none";
  btn.textContent = "⟳ Refresh Feed";
  btn.disabled = false;
  if (manual) showToast(`Synced ${allArticles.length} market updates`);
}

// ─── UI RENDERING ───────────────────────────────────────────
function renderNewsFeed() {
  const feed = document.getElementById("news-feed");
  const filtered = activeSection === "all" 
    ? allArticles 
    : allArticles.filter(a => a.section === activeSection);

  if (filtered.length === 0) {
    feed.innerHTML = `<div style="padding:40px; text-align:center; color:var(--text-dim)">No active reports for this segment.</div>`;
    return;
  }

  feed.innerHTML = filtered.map(a => `
    <div class="news-card ${a.isMajor ? 'major' : ''}" onclick="window.open('${a.link}', '_blank')">
      <div class="nc-source">${a.source} • ${timeAgo(a.timestamp)}</div>
      <div class="nc-headline">${a.isMajor ? '🚨 ' : ''}${a.headline}</div>
      <div class="nc-summary">${a.summary}...</div>
      <div style="display:flex; gap:10px; align-items:center">
         <span class="sentiment-pill pill-${a.sentiment}" style="font-size:0.6rem; padding:2px 8px; border-radius:4px; background:var(--accent-dim); color:var(--accent)">
           ${a.sentiment.toUpperCase()}
         </span>
         <span style="font-size:0.65rem; color:var(--text-dim)">Click to read source</span>
      </div>
    </div>
  `).join("");
}

// ─── CORE HELPERS ────────────────────────────────────────────
function detectSection(text) {
  for (const [sec, kws] of Object.entries(SECTION_KEYWORDS)) {
    if (kws.some(k => text.includes(k.toLowerCase()))) return sec;
  }
  return "macro";
}

function detectSentiment(text) {
  const bull = ["up", "rise", "higher", "surge", "gain", "rally"];
  const bear = ["down", "fall", "lower", "drop", "slump", "ban"];
  let score = 0;
  bull.forEach(w => { if(text.includes(w)) score++; });
  bear.forEach(w => { if(text.includes(w)) score--; });
  return score > 0 ? "bullish" : (score < 0 ? "bearish" : "neutral");
}

function timeAgo(ts) {
  const diff = Math.floor((Date.now() - ts) / 60000);
  if (diff < 60) return diff + "m ago";
  if (diff < 1440) return Math.floor(diff/60) + "h ago";
  return Math.floor(diff/1440) + "d ago";
}

function hashStr(s) {
  let h = 0;
  for(let i=0; i<s.length; i++) h = Math.imul(31, h) + s.charCodeAt(i) | 0;
  return h;
}

// ─── INITIALIZATION ──────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
  loadConfig();
  loadWatchlist();
  loadEvents();
  fetchAllNews(false);
  
  // Auto-refresh every 30 mins
  setInterval(() => fetchAllNews(false), 30 * 60 * 1000);
});

function openSettings() { document.getElementById("settings-panel").style.display = 'flex'; }
function saveSettings() {
  CONFIG.apiKey = document.getElementById("set-apikey").value;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(CONFIG));
  document.getElementById("settings-panel").style.display = 'none';
  showToast("Settings Saved");
}
</script>
</body>
</html>
